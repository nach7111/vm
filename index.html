<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 10 Enterprise Architecture - Web OS Platform v2.0</title>
    <style>
        /* Core Windows System Architecture Controls */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
        body { height: 100vh; overflow: hidden; background: #000; color: #fff; }

        /* Operating System System-Wide Styling Registry Variables */
        :root {
            --accent-color: #0078d7;
            --accent-light: #4ba3e3;
            --taskbar-bg: rgba(16, 16, 16, 0.85);
            --start-bg: rgba(31, 31, 31, 0.92);
            --win-bg: #ffffff;
            --win-text: #1a1a1a;
            --win-border: #1c97ea;
            --desktop-bg: radial-gradient(circle at 75% 30%, #1f518b 0%, #061830 100%);
        }
        .theme-dark {
            --win-bg: #1e1e1e;
            --win-text: #f0f0f0;
            --win-border: #444444;
        }

        /* Desktop Grid Canvas Workspace Layer */
        .desktop-canvas {
            height: calc(100vh - 40px);
            background: var(--desktop-bg);
            background-size: cover;
            background-position: center;
            position: relative;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 76px);
            grid-template-rows: repeat(auto-fill, 80px);
            grid-gap: 12px;
            grid-auto-flow: column;
            align-content: flex-start;
            justify-content: flex-start;
        }

        /* System Graphical Application Shortcut Blueprints */
        .sys-shortcut {
            width: 76px;
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 11px;
            text-align: center;
            cursor: default;
            border: 1px solid transparent;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.85);
            border-radius: 2px;
            transition: background 0.1s;
        }
        .sys-shortcut:hover { background: rgba(255, 255, 255, 0.12); border: 1px solid rgba(255, 255, 255, 0.2); }
        .sys-shortcut.selected { background: rgba(255, 255, 255, 0.22); border: 1px solid rgba(255, 255, 255, 0.35); }
        .sys-shortcut .shortcut-icon { font-size: 32px; margin-bottom: 2px; height: 36px; display: flex; align-items: center; justify-content: center; }
        .sys-shortcut .shortcut-label { width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 2px; }

        /* Enterprise Window Structural Pipeline Layout */
        .os-window {
            position: absolute;
            width: 620px;
            height: 440px;
            background: var(--win-bg);
            color: var(--win-text);
            border: 1px solid var(--win-border);
            box-shadow: 0 12px 35px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            border-radius: 3px;
            z-index: 100;
        }
        .os-window.window-focused { box-shadow: 0 15px 40px rgba(0,0,0,0.65); border: 1px solid var(--accent-color); }
        .os-window.window-maximized { top: 0 !important; left: 0 !important; width: 100vw !important; height: calc(100vh - 40px) !important; border: none; border-radius: 0; }
        
        /* Window Header Frame Configuration Elements */
        .window-titlebar {
            background: var(--win-bg);
            height: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-left: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            font-size: 12px;
        }
        .os-window.window-focused .window-titlebar { background: var(--win-bg); }
        .title-text-node { display: flex; align-items: center; gap: 8px; pointer-events: none; font-weight: 400; }
        .window-action-cluster { display: flex; height: 100%; }
        .action-node-btn {
            width: 46px;
            height: 100%;
            border: none;
            background: transparent;
            font-size: 12px;
            color: var(--win-text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default;
        }
        .action-node-btn:hover { background: rgba(0, 0, 0, 0.08); }
        .theme-dark .action-node-btn:hover { background: rgba(255, 255, 255, 0.08); }
        .action-node-btn.close-node:hover { background: #e81123 !important; color: #ffffff !important; }

        /* Window Internal Workspace Context Views */
        .window-viewport { flex: 1; padding: 0; overflow: auto; position: relative; display: flex; flex-direction: column; }

        /* System Native Sub-Application Structural Layout Interfaces */
        /* Application Architecture: Command Prompt */
        .cmd-canvas { background: #0c0c14; color: #cccccc; font-family: 'Consolas', monospace; font-size: 14px; flex: 1; padding: 12px; overflow-y: auto; cursor: text; }
        .cmd-line-block { display: flex; align-items: center; margin-top: 4px; }
        .cmd-terminal-input { background: transparent; border: none; outline: none; color: #ffffff; font-family: 'Consolas', monospace; font-size: 14px; flex: 1; margin-left: 6px; }

        /* Application Architecture: Notepad Engine */
        .notepad-menu-strip { background: #f0f0f0; border-bottom: 1px solid #dfdfdf; padding: 3px 8px; display: flex; gap: 12px; font-size: 12px; color: #222; }
        .notepad-menu-node { cursor: default; padding: 2px 5px; }
        .notepad-menu-node:hover { background: #e5e5e5; }
        .notepad-editor-canvas { width: 100%; flex: 1; border: none; resize: none; outline: none; background: var(--win-bg); color: var(--win-text); padding: 10px; font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.5; }

        /* Application Architecture: File Explorer Matrix Tree */
        .explorer-scaffold { display: flex; flex: 1; height: 100%; background: var(--win-bg); }
        .explorer-sidebar { width: 160px; border-right: 1px solid rgba(0,0,0,0.08); padding: 10px 5px; font-size: 12px; display: flex; flex-direction: column; gap: 4px; background: rgba(0,0,0,0.02); }
        .sidebar-folder-node { padding: 4px 8px; border-radius: 2px; display: flex; align-items: center; gap: 8px; cursor: default; }
        .sidebar-folder-node:hover, .sidebar-folder-node.active { background: rgba(0, 120, 212, 0.15); color: var(--accent-color); font-weight: 600; }
        .explorer-grid-view { flex: 1; padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, 80px); grid-gap: 15px; align-content: flex-start; }
        .explorer-file-cell { display: flex; flex-direction: column; align-items: center; text-align: center; font-size: 11px; width: 80px; padding: 5px; border: 1px solid transparent; }
        .explorer-file-cell:hover { background: rgba(0,120,212,0.08); border: 1px solid rgba(0,120,212,0.2); }
        .explorer-file-cell .file-glyph { font-size: 28px; margin-bottom: 4px; }

        /* Application Architecture: System Interactive Calculator Engine */
        .calculator-housing { max-width: 320px; margin: auto; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 10px; }
        .calculator-panel { width: 100%; background: rgba(0,0,0,0.03); border: none; color: var(--win-text); font-size: 36px; padding: 10px; text-align: right; outline: none; margin-bottom: 8px; }
        .calculator-buttons-matrix { display: grid; grid-template-columns: repeat(4, 1fr); grid-gap: 3px; flex: 1; }
        .calc-node-btn { background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.02); color: var(--win-text); font-size: 16px; font-weight: 400; display: flex; align-items: center; justify-content: center; cursor: default; }
        .calc-node-btn:hover { background: rgba(0,0,0,0.12); }
        .calc-node-btn.calc-accent-node { background: var(--accent-color); color: white; }
        .calc-node-btn.calc-accent-node:hover { background: var(--accent-light); }

        /* Application Architecture: Web Browser Edge Engine Module Frame */
        .edge-address-navigator { height: 36px; background: #f3f3f3; border-bottom: 1px solid #dcdcdc; display: flex; align-items: center; padding: 0 8px; gap: 8px; }
        .edge-nav-btn { font-size: 14px; padding: 2px 6px; color: #555; }
        .edge-url-bar-input { flex: 1; background: #ffffff; border: 1px solid #cccccc; border-radius: 2px; height: 24px; padding: 0 10px; font-size: 12px; color: #333; outline: none; }
        .edge-iframe-viewport { flex: 1; width: 100%; border: none; background: #ffffff; }

        /* Application Architecture: System Settings Framework Dashboard */
        .settings-scaffold { display: flex; flex: 1; height: 100%; }
        .settings-navigation-bar { width: 180px; background: rgba(0,0,0,0.02); border-right: 1px solid rgba(0,0,0,0.05); padding: 15px 5px; font-size: 12px; }
        .settings-nav-item { padding: 8px 12px; cursor: default; display: flex; align-items: center; gap: 10px; border-radius: 2px; }
        .settings-nav-item:hover { background: rgba(0,0,0,0.06); }
        .settings-nav-item.active { border-left: 3px solid var(--accent-color); background: rgba(0,0,0,0.04); font-weight: bold; }
        .settings-content-viewport { flex: 1; padding: 25px; }
        .settings-header-title { font-size: 20px; font-weight: 300; margin-bottom: 20px; border-bottom: 1px solid rgba(0,0,0,0.08); padding-bottom: 8px; }
        .settings-option-card { margin-bottom: 20px; }
        .settings-label-node { font-size: 13px; font-weight: 600; margin-bottom: 8px; display: block; }
        .settings-thumbnail-cluster { display: flex; gap: 12px; }
.wallpaper-tile-node { width: 80px; height: 50px; border: 2px solid transparent; cursor: default; background-size: cover; background-position: center; border-radius: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.15); }
.wallpaper-tile-node.active { border-color: var(--accent-color); }
/* System Desktop Interactive Context Popwindow Right-Click Grid Menu */
.os-context-menu {
position: absolute;
background: #f2f2f2;
color: #111111;
width: 160px;
box-shadow: 2px 2px 10px rgba(0,0,0,0.25);
border: 1px solid #bababa;
padding: 4px 0;
display: none;
z-index: 999999;
font-size: 12px;
}
.context-menu-item { padding: 6px 20px; cursor: default; display: flex; justify-content: space-between; }
.context-menu-item:hover { background: #e5e5e5; }
.context-menu-separator { height: 1px; background: #dfdfdf; margin: 4px 0; }
/* Unified Windows 10 Hardware Control Taskbar Interfacing Systems */
.os-taskbar-dock {
height: 40px;
background: var(--taskbar-bg);
backdrop-filter: blur(12px);
position: absolute;
bottom: 0; left: 0; right: 0;
display: flex;
justify-content: space-between;
align-items: center;
z-index: 999995;
border-top: 1px solid rgba(255,255,255,0.05);
}
.dock-segment-left, .dock-segment-right { display: flex; height: 100%; align-items: center; }
/* Windows Start Menu Launcher Toggle Elements */
.taskbar-start-trigger { width: 48px; height: 100%; display: flex; align-items: center; justify-content: center; cursor: default; transition: background 0.1s; }
.taskbar-start-trigger:hover { background: rgba(255, 255, 255, 0.15); }
.taskbar-start-trigger.active-trigger { background: rgba(255, 255, 255, 0.22); }
.start-icon-vector { width: 16px; height: 16px; fill: #ffffff; }
/* Cortana Advanced AI Taskbar Entry Component Wrapper */
.taskbar-cortana-capsule { background: rgba(255,255,255,0.12); border: 1px solid transparent; height: 30px; width: 240px; margin: 0 6px; display: flex; align-items: center; padding: 0 10px; gap: 8px; }
.taskbar-cortana-capsule:hover { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.16); }
.cortana-glyph-icon { font-size: 13px; color: #bbb; }
.cortana-text-field { background: transparent; border: none; outline: none; color: white; font-size: 12px; width: 100%; }
.cortana-text-field::placeholder { color: #ccc; }
/* Taskbar Active Program Task Node Rectangles */
.taskbar-running-programs-tray { display: flex; height: 100%; gap: 2px; margin-left: 5px; }
.program-task-tab { width: 44px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 20px; position: relative; border-bottom: 2px solid transparent; transition: background 0.1s; }
.program-task-tab:hover { background: rgba(255,255,255,0.1); }
.program-task-tab.tab-active { background: rgba(255,255,255,0.18); border-bottom-color: var(--accent-color); }
/* System Action Center Tray Notification & Clock Core Group */
.taskbar-system-tray { color: #ffffff; font-size: 11px; padding: 0 12px; text-align: right; line-height: 1.3; cursor: default; height: 100%; display: flex; flex-direction: column; justify-content: center; }
.taskbar-system-tray:hover { background: rgba(255, 255, 255, 0.12); }
/* Windows 10 Full Ecosystem Start Menu Panel Dashboard Overlay */
.win-start-dashboard {
position: absolute;
bottom: 40px; left: 0;
width: 640px;
height: 560px;
background: var(--start-bg);
backdrop-filter: blur(20px);
border-top: 1px solid rgba(255,255,255,0.06);
border-right: 1px solid rgba(255,255,255,0.06);
display: none;
z-index: 999990;
box-shadow: 3px 5px 25px rgba(0,0,0,0.65);
}
.win-start-dashboard.menu-visible { display: flex; }
.start-system-rail { width: 48px; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 8px; }
.rail-action-node { width: 100%; height: 44px; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; cursor: default; }
.rail-action-node:hover { background: rgba(255,255,255,0.12); }
.start-program-directory { width: 240px; height: 100%; padding: 12px 0; overflow-y: auto; color: white; font-size: 12.5px; border-right: 1px solid rgba(255,255,255,0.04); }
.directory-app-row { padding: 7px 20px; cursor: default; display: flex; align-items: center; gap: 14px; }
.directory-app-row:hover { background: rgba(255,255,255,0.08); }
.directory-app-row .app-icon-glyph { font-size: 16px; width: 20px; text-align: center; }
.start-tile-ecosystem { flex: 1; height: 100%; padding: 15px; display: grid; grid-template-columns: repeat(3, 1fr); grid-gap: 6px; align-content: flex-start; overflow-y: auto; }
.start-tile-node { background: var(--accent-color); color: white; padding: 12px; font-size: 11px; display: flex; flex-direction: column; justify-content: flex-end; min-height: 94px; position: relative; border: 1px solid transparent; }
.start-tile-node:hover { border-color: rgba(255,255,255,0.4); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2); }
.tile-vector-glyph { font-size: 26px; position: absolute; top: 12px; left: 12px; }
/* Notification Infrastructure Engine Alerts */
.toast-notification-center { position: absolute; bottom: 50px; right: 15px; width: 340px; display: flex; flex-direction: column; gap: 10px; z-index: 9999999; }
.toast-alert-card { background: rgba(30, 30, 30, 0.9); border-left: 4px solid var(--accent-color); border-radius: 2px; color: white; padding: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column; gap: 4px; animation: slideInAlert 0.25s ease-out; }
.toast-alert-header { font-size: 12px; font-weight: bold; color: var(--accent-color); display: flex; justify-content: space-between; }
.toast-alert-body { font-size: 12px; color: #ddd; }
@keyframes slideInAlert { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
