<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 10 Professional - Web Edition</title>
    <style>
        /* Core Windows Operating System Registry Resets */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
        body { height: 100vh; overflow: hidden; background: #0078d7; transition: background 0.3s; }

        /* System Variables & Themes */
        :root {
            --taskbar-bg: #101010;
            --start-bg: rgba(31, 31, 31, 0.97);
            --text-color: #ffffff;
            --win-bg: #ffffff;
            --win-text: #333333;
            --accent: #0078d7;
        }
        .dark-theme {
            --win-bg: #202020;
            --win-text: #ffffff;
        }

        /* Desktop Environment Container */
        .desktop {
            height: calc(100vh - 40px);
            background: radial-gradient(circle at 80% 20%, #1f518b 0%, #0a2240 100%);
            background-size: cover;
            background-position: center;
            position: relative;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        /* Desktop Icons styling matrix */
        .desktop-icon {
            width: 75px;
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 11px;
            text-align: center;
            cursor: pointer;
            border: 1px solid transparent;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            border-radius: 2px;
        }
        .desktop-icon:hover { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); }
        .desktop-icon .icon-img { font-size: 30px; margin-bottom: 4px; }

        /* Advanced OS Window Blueprint Architecture */
        .window {
            position: absolute;
            width: 550px;
            height: 400px;
            background: var(--win-bg);
            color: var(--win-text);
            border: 1px solid var(--accent);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            border-radius: 2px;
            z-index: 10;
        }
        .window-header {
            background: var(--win-bg);
            height: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-left: 10px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        .window-title { font-size: 12px; display: flex; align-items: center; gap: 6px; font-weight: 400; }
        .window-controls { display: flex; height: 100%; }
        .win-btn {
            width: 46px;
            height: 100%;
            border: none;
            background: transparent;
            font-size: 14px;
            color: var(--win-text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .win-btn:hover { background: rgba(0, 0, 0, 0.1); }
        .win-btn.close:hover { background: #e81123 !important; color: white !important; }

        /* Window Content Frames */
        .window-content { flex: 1; padding: 12px; overflow: auto; position: relative; }
        .window-content iframe { width: 100%; height: 100%; border: none; }

        /* Native Application Frameworks Sub-CSS */
        .notepad-txt { width: 100%; height: calc(100% - 30px); border: none; resize: none; outline: none; background: transparent; color: var(--win-text); font-family: monospace; font-size: 14px; }
        .sys-btn { background: var(--accent); color: white; border: none; padding: 6px 12px; cursor: pointer; margin-top: 5px; font-size: 12px; }
        .sys-btn:hover { opacity: 0.9; }
        
        /* Paint App Interface Elements */
        .paint-canvas { border: 1px solid #ccc; background: white; cursor: crosshair; display: block; }
        .paint-toolbar { display: flex; gap: 10px; margin-bottom: 8px; align-items: center; }

        /* Calculator Layout Array Matrix */
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-gap: 4px; height: calc(100% - 50px); }
        .calc-screen { width: 100%; height: 45px; background: rgba(0,0,0,0.05); border: none; text-align: right; padding: 10px; font-size: 20px; margin-bottom: 5px; color: var(--win-text); }
        .calc-btn { background: rgba(0,0,0,0.05); color: var(--win-text); border: none; font-size: 16px; cursor: pointer; }
        .calc-btn:hover { background: rgba(0,0,0,0.15); }

        /* Settings Dashboard Config Elements */
        .settings-row { margin-bottom: 15px; font-size: 13px; }
        .wallpaper-thumb { width: 60px; height: 40px; display: inline-block; margin-right: 8px; border: 2px solid transparent; cursor: pointer; background-size: cover; }
        .wallpaper-thumb.active { border-color: var(--accent); }

        /* Core Windows 10 Taskbar & Control Systems */
        .taskbar {
            height: 40px;
            background: var(--taskbar-bg);
            position: absolute;
            bottom: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 99999;
        }
        .taskbar-left, .taskbar-right { display: flex; height: 100%; align-items: center; }
        
        /* Start Button & Cortana Engine Layout */
        .start-button { width: 48px; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .start-button:hover, .taskbar-app-icon:hover { background: rgba(255, 255, 255, 0.15); }
        .start-svg { width: 16px; height: 16px; fill: #ffffff; }
        .start-button.active { background: rgba(255, 255, 255, 0.2); }
        
        .cortana-search {
            background: #202020;
            border: 1px solid #333;
            height: 30px;
            width: 200px;
            margin-left: 5px;
            padding: 0 10px;
            color: white;
            font-size: 12px;
            outline: none;
        }
        .cortana-search::placeholder { color: #aaa; }
        .taskbar-app-icon { width: 42px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }

        /* System Date and Notification Engine */
        .system-tray { color: white; font-size: 11px; padding: 0 12px; text-align: right; line-height: 1.3; cursor: pointer; height: 100%; display: flex; flex-direction: column; justify-content: center; }
        .system-tray:hover { background: rgba(255, 255, 255, 0.1); }

        /* Windows 10 Start Menu Dashboard */
        .start-menu {
            position: absolute;
            bottom: 40px; left: 0;
            width: 620px;
            height: 520px;
            background: var(--start-bg);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,255,255,0.08);
            border-right: 1px solid rgba(255,255,255,0.08);
            display: none;
            z-index: 99998;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
        }
        .start-menu.open { display: flex; }
        
        .start-sidebar { width: 48px; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 5px; }
        .sidebar-item { width: 100%; height: 44px; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; font-size: 16px; }
        .sidebar-item:hover { background: rgba(255,255,255,0.1); }
        
        .start-apps { width: 220px; height: 100%; padding: 10px 0; overflow-y: auto; color: white; font-size: 12px; }
        .app-item { padding: 8px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .app-item:hover { background: rgba(255,255,255,0.1); }

        .start-tiles { flex: 1; height: 100%; padding: 15px; display: grid; grid-template-columns: repeat(3, 1fr); grid-gap: 6px; align-content: flex-start; overflow-y: auto; }
        .tile { background: var(--accent); color: white; padding: 10px; font-size: 11px; display: flex; flex-direction: column; justify-content: flex-end; min-height: 90px; cursor: pointer; position: relative; }
        .tile:hover { outline: 2px solid rgba(255,255,255,0.4); }
        .tile-icon { font-size: 22px; position: absolute; top: 12px; left: 12px; }
    </style>
</head>
<body id="sysBody">

    <!-- Desktop Active Layer Context -->
    <div class="desktop" id="desktop">
        <div class="desktop-icon" onclick="openWindow('This PC', '🖥️', 'this-pc')">
            <div class="icon-img">🖥️</div>
            <div>This PC</div>
        </div>
        <div class="desktop-icon" onclick="openWindow('Notepad File Explorer', '📝', 'notepad')">
            <div class="icon-img">📝</div>
            <div>Notepad</div>
        </div>
        <div class="desktop-icon" onclick="openWindow('System Calculator', '🧮', 'calc')">
            <div class="icon-img">🧮</div>
            <div>Calculator</div>
        </div>
        <div class="desktop-icon" onclick="openWindow('MS Paint Studio', '🎨', 'paint')">
            <div class="icon-img">🎨</div>
            <div>MS Paint</div>
        </div>
        <div class="desktop-icon" onclick="openWindow('Control Settings', '⚙️', 'settings')">
            <div class="icon-img">⚙️</div>
            <div>Settings</div>
        </div>
        <div class="desktop-icon" onclick="openWindow('Bing Browser Edge', '🌐', 'browser')">
            <div class="icon-img">🌐</div>
            <div>Microsoft Edge</div>
        </div>

    </div>
   <!-- Start Menu -->
    <div class="start-menu" id="startMenu">
        <div class="start-sidebar">
            <div class="sidebar-item" title="User">👤</div>
            <div class="sidebar-item" title="Settings">⚙️</div>
            <div class="sidebar-item" onclick="location.reload()" title="Power">⏻</div>
        </div>
        <div class="start-apps">
            <div class="app-item" onclick="toggleStart(); openWindow('This PC', '💾', 'system-pc')">🖥️ This PC</div>
            <div class="app-item" onclick="toggleStart(); openWindow('Bing Browser', '🌐', 'browser')">🌐 Bing Browser</div>
            <div class="app-item" onclick="toggleStart(); openWindow('Recycle Bin', '🗑️', 'trash')">🗑️ Recycle Bin</div>
        </div>
        <div class="start-tiles">
            <div class="tile" onclick="toggleStart(); openWindow('Bing Browser', '🌐', 'browser')">
                <span class="tile-icon">🌐</span><span>Bing Browser</span>
            </div>
            <div class="tile" style="background: #2b579a;">
                <span class="tile-icon">📅</span><span>Calendar</span>
            </div>
            <div class="tile" style="background: #b91d47;">
                <span class="tile-icon">❤️</span><span>Health</span>
            </div>
        </div>
    </div>

    <!-- Taskbar Layer -->
    <div class="taskbar">
        <div class="taskbar-left">
            <div class="start-button" id="startBtn" onclick="toggleStart()">
                <svg class="start-svg" viewBox="0 0 24 24">
                    <path d="M0 3.449L9.75 2.1v9.45H0V3.449zM0 12.45h9.75v9.45L0 20.551v-8.1zM10.8 1.95L24 0v11.55H10.8V1.95zM10.8 12.45H24v11.55l-13.2-1.95v-9.6z"/>
                </svg>
            </div>
        </div>
        <div class="taskbar-right">
            <div class="system-tray">
                <div id="tray-time">12:00 PM</div>
                <div id="tray-date">10/06/2026</div>
            </div>
        </div>
    </div>

    <!-- Core Desktop OS Engine Logic -->
    <script>
        let highestZ = 10;

        // Toggles the Start Menu Open/Closed
        function toggleStart() {
            const menu = document.getElementById('startMenu');
            const btn = document.getElementById('startBtn');
            menu.classList.toggle('open');
            btn.classList.toggle('active');
        }

        // Closes Start Menu if clicking outside of it
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('startMenu');
            const btn = document.getElementById('startBtn');
            if (!menu.contains(e.target) && !btn.contains(e.target)) {
                menu.classList.remove('open');
                btn.classList.remove('active');
            }
        });

        // App View Generator Factory
        function openWindow(title, emoji, contextType) {
            highestZ++;
            // Simple view HTML to avoid multiline template literals
            let viewHtml = '<div style="font-size:13px; color:#333; padding:5px;">' +
                '<div style="font-weight:600; margin-bottom:6px;">' + emoji + ' ' + title + '</div>' +
                '<div>Welcome to the virtual machine window.</div>' +
                '</div>';

            const win = document.createElement('div');
            win.className = 'window';
            win.style.left = (50 + Math.random() * 200) + 'px';
            win.style.top = (50 + Math.random() * 120) + 'px';
            win.style.zIndex = highestZ;
            win.innerHTML = '<div class="window-header"> <div class="window-title"><span>' + emoji + '</span> ' + title + '</div> <div class="window-controls"> <button class="win-btn" onclick="this.closest(\'.window\').style.display=\'none\'">—</button> <button class="win-btn close" onclick="this.closest(\'.window\').remove()">✕</button> </div> </div> <div class="window-content">' + viewHtml + '</div>';
            document.getElementById('desktop').appendChild(win);
            makeDraggable(win);
            win.addEventListener('mousedown', () => {
                highestZ++;
                win.style.zIndex = highestZ;
            });
        }

        // Window dragging helper
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            minutes = minutes < 10 ? '0'+minutes : minutes;
            document.getElementById('tray-time').textContent = hours + ':' + minutes + ' ' + ampm;
            document.getElementById('tray-date').textContent = (now.getMonth()+1) + '/' + now.getDate() + '/' + now.getFullYear();
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
