<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 10 Pro - Enterprise Web Edition</title>
    <style>
        /* Modern UI Core Registry Variables */
        :root {
            --accent-color: #0078d7;
            --taskbar-bg: rgba(16, 16, 16, 0.85);
            --window-bg: #f3f3f3;
            --window-text: #000000;
            --window-border: #1c97ea;
            --start-bg: rgba(20, 20, 20, 0.9);
            --desktop-bg: radial-gradient(circle at 80% 20%, #1f518b 0%, #0a2240 100%);
        }
        .dark-theme {
            --window-bg: #1f1f1f;
            --window-text: #ffffff;
            --window-border: #555555;
            --accent-color: #4cc2ff;
        }

        /* Core System Layout Resets */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Segoe UI', -apple-system, sans-serif; }
        body { height: 100vh; overflow: hidden; background: #000; color: #fff; }

        /* Wallpaper Sub-architecture Canvas */
        .desktop {
            height: calc(100vh - 40px);
            background: var(--desktop-bg);
            background-size: cover;
            background-position: center;
            position: relative;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-content: flex-start;
            flex-wrap: wrap;
        }

        /* Highly Authentic Windows 10 Icon System */
        .desktop-icon {
            width: 76px;
            height: 82px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 11px;
            text-align: center;
            cursor: pointer;
            border: 1px solid transparent;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
            border-radius: 2px;
            transition: background 0.1s;
        }
        .desktop-icon:hover { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); }
        .desktop-icon .icon-img { font-size: 32px; margin-bottom: 4px; }

        /* Window OS Blueprint Layout Architecture */
        .window {
            position: absolute;
            width: 600px;
            height: 420px;
            background: var(--window-bg);
            color: var(--window-text);
            border: 1px solid var(--window-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            border-radius: 3px;
            z-index: 10;
            overflow: hidden;
            transition: width 0.15s ease, height 0.15s ease, top 0.15s ease, left 0.15s ease;
        }
        .window.maximized { width: 100vw !important; height: calc(100vh - 40px) !important; top: 0 !important; left: 0 !important; }
        
        /* Fluent Window Controls Styling Headers */
        .window-header {
            background: var(--window-bg);
            height: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-left: 12px;
            border-bottom: 1px solid rgba(128,128,128,0.2);
            cursor: default;
        }
        .window-title { font-size: 12px; display: flex; align-items: center; gap: 8px; }
        .window-controls { display: flex; height: 100%; }
        .win-btn {
            width: 46px;
            height: 100%;
            border: none;
            background: transparent;
            font-size: 13px;
            color: var(--window-text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s;
        }
        .win-btn:hover { background: rgba(128,128,128,0.2); }
        .win-btn.close:hover { background: #e81123 !important; color: white !important; }

        .window-content { flex: 1; padding: 15px; overflow: auto; position: relative; font-size: 13px; }
        .window-content iframe { width: 100%; height: 100%; border: none; background: white; }

        /* Native App Interfaces Structures */
        .notepad-txt { width: 100%; height: 100%; border: none; resize: none; outline: none; background: transparent; color: var(--window-text); font-family: 'Consolas', monospace; font-size: 14px; }
        .sys-btn { background: var(--accent-color); color: white; border: none; padding: 6px 14px; cursor: pointer; font-size: 12px; border-radius: 2px; }
        .sys-btn:hover { opacity: 0.9; }

        /* Command Prompt Executable Frame (cmd.exe) */
        .cmd-body { background: #000000 !important; color: #00ff00 !important; font-family: 'Consolas', monospace; height: 100%; padding: 10px; display: flex; flex-direction: column; }
        .cmd-output { flex: 1; overflow-y: auto; white-space: pre-wrap; margin-bottom: 5px; font-size: 13px; }
        .cmd-input-line { display: flex; align-items: center; }
        .cmd-input { background: transparent; border: none; color: inherit; font-family: inherit; font-size: 13px; flex: 1; outline: none; }

        /* File Explorer Interface Modules */
        .explorer-layout { display: flex; height: 100%; gap: 15px; }
        .explorer-sidebar { width: 130px; border-right: 1px solid rgba(128,128,128,0.2); display: flex; flex-direction: column; gap: 8px; }
        .sidebar-node { padding: 4px 8px; cursor: pointer; border-radius: 2px; }
        .sidebar-node:hover { background: rgba(128,128,128,0.15); }
        .explorer-main { flex: 1; display: flex; gap: 20px; align-content: flex-start; flex-wrap: wrap; }
        .file-item { width: 70px; text-align: center; cursor: pointer; font-size: 12px; }
        .file-item:hover { background: rgba(128,128,128,0.1); }

        /* Control Panel Settings Framework */
        .settings-container { display: flex; flex-direction: column; gap: 15px; }
        .config-block { padding: 10px; border-radius: 4px; background: rgba(128,128,128,0.1); }
        .thumb-grid { display: flex; gap: 10px; margin-top: 8px; }
        .bg-thumb { width: 60px; height: 40px; cursor: pointer; border: 2px solid transparent; background-size: cover; }
        .bg-thumb.active { border-color: var(--accent-color); }

        /* Professional Taskbar & System Tray Construction */
        .taskbar {
            height: 40px;
            background: var(--taskbar-bg);
            backdrop-filter: blur(12px);
            position: absolute;
            bottom: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 99999;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .taskbar-left, .taskbar-right { display: flex; height: 100%; align-items: center; }
        
        /* Start Button & Search UI Layout */
        .start-button { width: 48px; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.1s; }
        .start-button:hover, .task-pin:hover { background: rgba(255, 255, 255, 0.15); }
        .start-svg { width: 16px; height: 16px; fill: #ffffff; }
        .start-button.active { background: rgba(255, 255, 255, 0.2); }
        
        .search-container { background: rgba(255,255,255,0.12); border: 1px solid transparent; height: 30px; width: 220px; margin-left: 4px; display: flex; align-items: center; padding: 0 10px; }
        .search-container:focus-within { background: #fff; border-color: var(--accent-color); }
        .search-container input { background: transparent; border: none; height: 100%; width: 100%; color: white; font-size: 12px; outline: none; }
        .search-container :focus-within input { color: #000; }
        .task-pin { width: 44px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: background 0.1s; position: relative; }
        .task-pin::after { content: ''; position: absolute; bottom: 0; left: 25%; width: 50%; height: 2px; background: transparent; }
        .task-pin.active::after { background: var(--accent-color); }

        .system-tray { color: white; font-size: 11px; padding: 0 12px; text-align: right; line-height: 1.4; cursor: pointer; height: 100%; display: flex; flex-direction: column; justify-content: center; }
        .system-tray:hover { background: rgba(255, 255, 255, 0.1); }

        /* Windows 10 Start Menu Framework Layout */
        .start-menu {
            position: absolute;
            bottom: 40px; left: 0;
            width: 640px;
            height: 540px;
            background: var(--start-bg);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: none;
            z-index: 99998;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        .start-menu.open { display: flex; }
        
        .start-sidebar { width: 48px; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 8px; background: rgba(0,0,0,0.2); }
        .sidebar-item { width: 100%; height: 44px; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; font-size: 16px; }
        .sidebar-item:hover { background: rgba(255,255,255,0.1); }
        
        .start-apps { width: 232px; height: 100%; padding: 10px 0; overflow-y: auto; color: white; font-size: 12px; }
        .app-item { padding: 8px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .app-item:hover { background: rgba(255,255,255,0.1); }
        .start-tiles { flex: 1; height: 100%; padding: 15px; display: grid; grid-template-columns: repeat(3, 1fr); grid-gap: 8px; align-content: flex-start; overflow-y: auto; }
        .tile { background: var(--accent-color); color: white; padding: 12px; font-size: 12px; display: flex; flex-direction: column; justify-content: flex-end; min-height: 95px; cursor: pointer; position: relative; }
        .tile:hover { outline: 2px solid rgba(255,255,255,0.5); }
        .tile-icon { font-size: 24px; position: absolute; top: 12px; left: 12px; }
